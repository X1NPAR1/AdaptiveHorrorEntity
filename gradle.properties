# Minecraft / mappings (official Mojang mappings)
minecraft_version=1.21.1
enabled_platforms=fabric,neoforge

# Fabric
fabric_loader_version=0.16.5
fabric_api_version=0.115.1+1.21.1

# NeoForge
neoforge_version=21.1.90

# Architectury toolchain
architectury_plugin_version=3.4-SNAPSHOT
architectury_loom_version=1.7-SNAPSHOT

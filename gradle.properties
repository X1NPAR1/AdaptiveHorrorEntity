# ----------------------------------------------------------------------------
#  Adaptive Horror Entity - build configuration
#  Target: Minecraft 1.21.1 (NeoForge + Fabric via Architectury multi-loader)
# ----------------------------------------------------------------------------
org.gradle.jvmargs=-Xmx3G
org.gradle.daemon=false

# Mod metadata
mod_id=adaptivehorror
mod_name=Adaptive Horror Entity
mod_version=2.13.0
maven_group=com.adaptivehorror
archives_base_name=adaptive-horror-entity
mod_author=AdaptiveHorror
